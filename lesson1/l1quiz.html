<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lesson 1 • Quiz</title>

<style>
body {
  margin: 0;
  font-family: Verdana, sans-serif;
  background: linear-gradient(#0f3d5e, #0b2e47);
  color: white;
}

header {
  padding: 1rem 2rem;
  background: #1b5583;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.timer {
  font-weight: bold;
  background: #fff;
  color: #1b5583;
  padding: 0.4rem 0.8rem;
  border-radius: 20px;
}

main {
  max-width: 700px;
  margin: 2rem auto;
  background: white;
  color: #222;
  padding: 2rem;
  border-radius: 1.5rem;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.question {
  font-size: 1.2rem;
  margin-bottom: 1rem;
}

.options button {
  display: block;
  width: 100%;
  margin: 0.6rem 0;
  padding: 0.8rem;
  border-radius: 10px;
  border: 2px solid #1b5583;
  background: #eef4fa;
  cursor: pointer;
  font-size: 1rem;
}

.options button:hover {
  background: #dbe7f0;
}

.options button.correct {
  background: #c8f7c5;
  border-color: #2ecc71;
}

.options button.wrong {
  background: #f7c5c5;
  border-color: #e74c3c;
}

.footer {
  margin-top: 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stars {
  font-weight: bold;
  color: #f1c40f;
}
</style>
</head>

<body>

<header>
  <h2>Lesson 1 • Rapid Quiz</h2>
  <div class="timer" id="timer">05:00</div>
</header>

<main>
  <div class="question" id="question"></div>

  <div class="options" id="options"></div>

  <div class="footer">
    <div class="stars">⭐ Stars: <span id="stars">0</span></div>
    <div>Question <span id="qNum">1</span>/10</div>
  </div>
</main>

<script>

if (localStorage.getItem("quiz_l1_done") === "true") {
  alert("✅ You have already completed this quiz.");
  window.location.href = "lesson-map.html";
}


const quiz = [
  {
    q: "Consectetur, adipisci velit, sed quia non numquam eius modi tempora?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 0,
    stars: 2
  },
  {
    q: "Itaque earum rerum hic tenetur a sapiente delectus?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 1,
    stars: 1
  },
  {
    q: "At vero eos et accusamus et iusto odio dignissimos ducimus?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 2,
    stars: 2
  },
  {
    q: "Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 3,
    stars: 1
  },
  {
    q: "Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 0,
    stars: 2
  },
  {
    q: "Consectetur, adipisci velit, sed quia non numquam eius modi tempora?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 1,
    stars: 1
  },
  {
    q: "Temporibus autem quibusdam et aut officiis debitis aut rerum necessitatibus?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 2,
    stars: 2
  },
  {
    q: "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 3,
    stars: 1
  },
  {
    q: "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 0,
    stars: 2
  },
  {
    q: "Temporibus autem quibusdam et aut officiis debitis aut rerum necessitatibus?",
    options: ["Option A", "Option B", "Option C", "Option D"],
    answer: 1,
    stars: 1
  }
];

let index = 0;
let totalStars = 0;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const starsEl = document.getElementById("stars");
const qNumEl = document.getElementById("qNum");

function loadQuestion() {
  const current = quiz[index];
  questionEl.textContent = current.q;
  optionsEl.innerHTML = "";
  qNumEl.textContent = index + 1;

  current.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, i);
    optionsEl.appendChild(btn);
  });
}

function selectAnswer(button, selected) {
  const correct = quiz[index].answer;
  const buttons = optionsEl.querySelectorAll("button");

  buttons.forEach(b => b.disabled = true);

  if (selected === correct) {
    button.classList.add("correct");
    totalStars += quiz[index].stars;
    starsEl.textContent = totalStars;
  } else {
    button.classList.add("wrong");
    buttons[correct].classList.add("correct");
  }

  setTimeout(() => {
    index++;
    if (index < quiz.length) {
      loadQuestion();
    } else {
      endQuiz();
    }
  }, 900);
}

/* TIMER */
let time = 300;
const timerEl = document.getElementById("timer");

const countdown = setInterval(() => {
  time--;
  const min = String(Math.floor(time / 60)).padStart(2, "0");
  const sec = String(time % 60).padStart(2, "0");
  timerEl.textContent = `${min}:${sec}`;

  if (time <= 0) {
    clearInterval(countdown);
    endQuiz();
  }
}, 1000);

function endQuiz() {
  clearInterval(countdown);

  // SAVE STARS
  const oldStars = Number(localStorage.getItem("stars")) || 0;
  localStorage.setItem("stars", oldStars + totalStars);

  // MARK LESSON 1 COMPLETE
  localStorage.setItem("completedLessons", 1);

  alert(`Quiz completed! ⭐ Stars earned: ${totalStars}`);

  // NEXT: GO BACK TO MAP
  window.location.href = "../lessonmap/lesson-map.html";
}

loadQuestion();
</script>

</body>
</html>
