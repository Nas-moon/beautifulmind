<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 5 – Topic 1</title>

<style>
body {
  margin: 0;
  font-family: Verdana, sans-serif;
  background: #eef4fa;
  color: #222;
}

/* HEADER */
header {
  background: #1b5583;
  color: white;
  padding: 1rem 2rem;
}

header h1 {
  margin: 0;
  font-size: 1.2rem;
}

/* MAIN */
main {
  max-width: 900px;
  margin: 2rem auto;
  padding: 1.5rem;
  background: white;
  border-radius: 1.5rem;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}

h2 {
  color: #1b5583;
  margin-bottom: 1rem;
}

/* VIDEO */
.video-wrapper {
  margin-bottom: 1.5rem;
  border-radius: 1rem;
  overflow: hidden;
}

/* BUTTON */
button {
  background: #1b5583;
  color: white;
  border: none;
  padding: 0.8rem 1.4rem;
  border-radius: 0.6rem;
  font-size: 1rem;
  cursor: pointer;
}

button:disabled {
  background: #9fb6cc;
  cursor: not-allowed;
}

/* PROGRESS TEXT */
#progress {
  margin-top: 1rem;
  font-size: 0.9rem;
  color: #444;
}

.back {
  margin-left: auto;
  margin-right: 10%;
  padding: 2px 0.5em;
  border-radius: 8px;
  box-sizing: border-box;
  font-family: verdana;
  font-weight: bold;
  background-color: #e6eef4;
  color: #1b5583;  
  border: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  font-size: 15px;
  margin-top: 5px;
  display: flex;
  justify-content: flex-start;
  margin-left: auto;
  margin-right: 20px;
  line-height: 2em;

}

.back:hover,
.tracker:hover {
  background-color: #dbe7f0;
}

.heado {
  display: flex;
}

</style>
</head>

<body>

<header>
  <div class="heado">
   <h1>Lesson 5 • Topic 1</h1>
   <a href="lessons.html"><button class="back">Back</button></a>
  </div>
</header>

<main>
  <h2>Introduction</h2>

  <div class="video-wrapper">
    <iframe
      title="Lesson 5 Topic 1"
      src="https://drive.google.com/file/d/1pJLGJta7NXbqT1TenQ7dqicwqX6f3yF5/preview"
      width="100%"
      height="450"
      allow="autoplay"
      allowfullscreen
    ></iframe>
  </div>

  <button id="nextBtn" disabled>
    Proceed to Topic 2 →
  </button>

  <p id="progress">Watching video…</p>
</main>

<script>
const VIDEO_DURATION = 10; // seconds (change per video)
let watched = 0;
const nextBtn = document.getElementById("nextBtn");
const progress = document.getElementById("progress");

const timer = setInterval(() => {
  watched++;
  progress.textContent = `Watched ${watched} / ${VIDEO_DURATION} seconds`;

  if (watched >= VIDEO_DURATION) {
    clearInterval(timer);
    nextBtn.disabled = false;
    progress.textContent = "✅ Topic completed!";
  }
}, 1000);

nextBtn.addEventListener("click", () => {
  window.location.href = "l5topic2.html";
});

</script>

</body>
</html>
