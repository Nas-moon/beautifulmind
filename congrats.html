<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congratulations! – Beautiful Mind</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Verdana, sans-serif;
  background: linear-gradient(to bottom, #0f2f4a 0%, #1b5583 60%, #164b73 100%);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── STARFIELD ── */
.starfield {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}
.starfield span {
  position: absolute;
  top: -10%;
  width: 10px; height: 10px;
  background: #ffd84d;
  border-radius: 50%;
  box-shadow: 0 0 8px #ffd84d, 0 0 16px rgba(255,216,77,0.8);
  animation: fall linear infinite;
}
.starfield span:nth-child(1){left:5%;animation-duration:12s}
.starfield span:nth-child(2){left:15%;animation-duration:18s}
.starfield span:nth-child(3){left:25%;animation-duration:14s}
.starfield span:nth-child(4){left:35%;animation-duration:20s}
.starfield span:nth-child(5){left:45%;animation-duration:16s}
.starfield span:nth-child(6){left:55%;animation-duration:22s}
.starfield span:nth-child(7){left:65%;animation-duration:15s}
.starfield span:nth-child(8){left:75%;animation-duration:19s}
.starfield span:nth-child(9){left:85%;animation-duration:13s}
.starfield span:nth-child(10){left:95%;animation-duration:21s}
.starfield span:nth-child(11){left:10%;animation-duration:17s}
.starfield span:nth-child(12){left:30%;animation-duration:23s}
.starfield span:nth-child(13){left:50%;animation-duration:14s}
.starfield span:nth-child(14){left:70%;animation-duration:18s}
.starfield span:nth-child(15){left:90%;animation-duration:20s}
@keyframes fall {
  from { transform: translateY(-10vh); opacity: 0; }
  10%  { opacity: 1; }
  to   { transform: translateY(110vh); opacity: 0; }
}

/* ── HEADER (matches site) ── */
.site-header {
  position: relative;
  z-index: 10;
  padding: 0.8rem 0 1rem;
}
.header-bg {
  position: absolute;
  inset: 0;
  background: #1b5583;
  z-index: -1;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.navi {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 1.5rem;
}
.ice { display: flex; gap: 10px; align-items: center; }
.logoname {
  background: #e6eef4;
  color: #1b5583;
  font-family: Verdana;
  font-weight: bold;
  border-radius: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  font-size: 18px;
  padding: 4px 12px;
  display: flex;
  align-items: center;
}

/* ── MAIN CONTENT ── */
main {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1.5rem 4rem;
}

/* ── TROPHY ANIMATION ── */
.trophy-wrap {
  font-size: clamp(5rem, 18vw, 9rem);
  animation: trophyBounce 1s cubic-bezier(0.36, 0.07, 0.19, 0.97) 0.3s both;
  filter: drop-shadow(0 0 30px rgba(255,215,0,0.8));
  margin-bottom: 1rem;
}
@keyframes trophyBounce {
  0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
  80%  { transform: scale(0.95) rotate(-3deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* ── TITLE ── */
.congrats-title {
  color: #ffd700;
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 900;
  text-align: center;
  text-shadow: 0 0 30px rgba(255,215,0,0.6), 2px 2px 8px rgba(0,0,0,0.3);
  animation: fadeSlideUp 0.8s ease 0.8s both;
  letter-spacing: 0.02em;
}
.congrats-name {
  color: #e6eef4;
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  text-align: center;
  margin-top: 0.5rem;
  animation: fadeSlideUp 0.8s ease 1s both;
  font-weight: 600;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CARD ── */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 24px;
  padding: 2rem;
  max-width: 540px;
  width: 100%;
  margin-top: 2rem;
  animation: fadeSlideUp 0.8s ease 1.2s both;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

.card h2 {
  color: #e6eef4;
  font-size: clamp(1.1rem, 3.5vw, 1.4rem);
  text-align: center;
  margin-bottom: 1.5rem;
  font-family: Verdana;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 1.5rem;
}
.stat-box {
  background: rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 14px 8px;
  text-align: center;
}
.stat-val {
  color: #ffd700;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 900;
}
.stat-lbl {
  color: #c7e4ee;
  font-size: 0.75rem;
  margin-top: 4px;
  font-family: Verdana;
}

/* ── BADGE ROW ── */
.badge-row {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 1.8rem;
}
.badge {
  background: linear-gradient(135deg, #ffd700, #ffa500);
  border-radius: 50%;
  width: clamp(56px, 12vw, 72px);
  height: clamp(56px, 12vw, 72px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.5rem, 4vw, 2rem);
  box-shadow: 0 4px 16px rgba(255,165,0,0.5);
  animation: badgePop 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
}
.badge:nth-child(1){animation-delay:1.4s}
.badge:nth-child(2){animation-delay:1.6s}
.badge:nth-child(3){animation-delay:1.8s}
.badge:nth-child(4){animation-delay:2.0s}
.badge:nth-child(5){animation-delay:2.2s}
@keyframes badgePop {
  0%  { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.15); opacity: 1; }
  100%{ transform: scale(1); }
}

/* ── THANK YOU MESSAGE ── */
.thankyou {
  color: #e6eef4;
  font-family: Verdana;
  font-size: clamp(0.85rem, 2.5vw, 1rem);
  text-align: center;
  line-height: 1.8;
  border-top: 1px solid rgba(255,255,255,0.15);
  padding-top: 1.2rem;
}
.thankyou strong { color: #ffd700; }

/* ── BUTTON ── */
.btn-wrap {
  margin-top: 2rem;
  animation: fadeSlideUp 0.8s ease 2.5s both;
}
.home-btn {
  background: linear-gradient(135deg, #ffd700, #ffa500);
  color: #0f2f4a;
  font-family: Verdana;
  font-weight: 900;
  font-size: clamp(0.95rem, 2.5vw, 1.1rem);
  border: none;
  padding: 14px 36px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,165,0,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
}
.home-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 28px rgba(255,165,0,0.7);
}

/* ── CONFETTI ── */
.confetti-piece {
  position: fixed;
  width: 10px; height: 10px;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall 3s ease-out forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .card { padding: 1.5rem 1rem; }
}
</style>
</head>
<body>

<!-- Starfield (matches index.html) -->
<div class="starfield">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- Header (matches index.html) -->
<header class="site-header">
  <div class="header-bg"></div>
  <nav class="navi">
    <div class="ice">
      <svg id="fire" xmlns="http://www.w3.org/2000/svg" width="3em" height="3em" viewBox="0 0 24 24">
        <g fill="none">
          <path d="m12.593 23.258l-.011.002l-.071.035l-.02.004l-.014-.004l-.071-.035q-.016-.005-.024.005l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.017-.018m.265-.113l-.013.002l-.185.093l-.01.01l-.003.011l.018.43l.005.012l.008.007l.201.093q.019.005.029-.008l.004-.014l-.034-.614q-.005-.018-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.004-.011l.017-.43l-.003-.012l-.01-.01z"/>
          <path fill="#ffda33" d="M10.92 2.868a1.25 1.25 0 0 1 2.16 0l2.795 4.798l5.428 1.176a1.25 1.25 0 0 1 .667 2.054l-3.7 4.141l.56 5.525a1.25 1.25 0 0 1-1.748 1.27L12 19.592l-5.082 2.24a1.25 1.25 0 0 1-1.748-1.27l.56-5.525l-3.7-4.14a1.25 1.25 0 0 1 .667-2.055l5.428-1.176z"/>
        </g>
      </svg>
      <div class="logoname"><p>BEAUTIFUL MIND</p></div>
    </div>
  </nav>
</header>

<main>
  <div class="trophy-wrap">🏆</div>

  <h1 class="congrats-title">You Did It!</h1>
  <p class="congrats-name" id="studentName">Amazing work, Champion!</p>

  <div class="card">
    <h2>🌟 Your Journey is Complete!</h2>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val">5</div>
        <div class="stat-lbl">Lessons<br>Completed</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="totalStarsDisplay">0</div>
        <div class="stat-lbl">⭐ Stars<br>Earned</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">5</div>
        <div class="stat-lbl">Quizzes<br>Passed</div>
      </div>
    </div>

    <!-- One badge per lesson completed -->
    <div class="badge-row">
      <div class="badge" title="Lesson 1 Complete">🧠</div>
      <div class="badge" title="Lesson 2 Complete">💡</div>
      <div class="badge" title="Lesson 3 Complete">🚀</div>
      <div class="badge" title="Lesson 4 Complete">🎯</div>
      <div class="badge" title="Lesson 5 Complete">👑</div>
    </div>

    <div class="thankyou">
      <p>
        Thank you for being a part of <strong>Beautiful Mind</strong>! 🌟<br>
        You've shown incredible dedication and heart.<br>
        Keep nurturing your beautiful mind every single day. 💙
      </p>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="home-btn" onclick="window.location.href='../index.html'">
      🏠 Back to Home
    </button>
  </div>
</main>

<script>
// Show student name
const name = localStorage.getItem('userName') || '';
if (name) {
  document.getElementById('studentName').textContent = `Amazing work, ${name}! 🎉`;
}

// Show total stars
const stars = localStorage.getItem('totalStars') || 0;
document.getElementById('totalStarsDisplay').textContent = stars;

// Confetti burst on load
function launchConfetti() {
  const colors = ['#ffd700','#ff6b6b','#4ecdc4','#c7e4ee','#ffa500','#58cc02','#e6eef4'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top  = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.width  = Math.random() * 8 + 6 + 'px';
      c.style.height = Math.random() * 8 + 6 + 'px';
      c.style.animationDuration = Math.random() * 2 + 2 + 's';
      c.style.animationDelay = '0s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 40);
  }
}

// Launch confetti after a short delay
setTimeout(launchConfetti, 500);
setTimeout(launchConfetti, 2500);
</script>
</body>
</html>
